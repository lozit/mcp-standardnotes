name: Publish (npm + MCP Registry)

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Verify versions are synchronized
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          SRV_VERSION=$(node -p "require('./server.json').version")
          PKG_IN_SRV=$(node -p "require('./server.json').packages[0].version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ] || [ "$SRV_VERSION" != "$TAG_VERSION" ] || [ "$PKG_IN_SRV" != "$TAG_VERSION" ]; then
            echo "Version mismatch between tag ($TAG_VERSION), package.json ($PKG_VERSION), server.json ($SRV_VERSION), server.json packages[0] ($PKG_IN_SRV)"
            exit 1
          fi

      - name: Typecheck, lint, test
        run: |
          npm run typecheck
          npm run lint
          npm test

      - name: Build
        run: npm run build

      - name: Publish to npm (with provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Validate server.json
        run: ./mcp-publisher validate

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
